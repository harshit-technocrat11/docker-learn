services:
  mongo:
    image: mongo
    ports: 
    - 27017:27017
    environment:
      MONGODB_INIT_ROOT_USERNAME: ADMIN
      MONGODB_INIT_ROOT_PASSWORD: QWERTY

  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin,
      ME_CONFIG_MONGODB_ADMINPASSWORD: qwerty,
      ME_CONFIG_MONGODB_SERVER: mongo,
      ME_CONFIG_MONGODB_PORT: 27017,


